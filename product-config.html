<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>产品配置 - 项目综合指标估算工具</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 16px; width: 100%; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 24px;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: var(--primary); color: #fff; }
    .debug {
      margin-top: 24px;
      padding: 16px;
      background: #f1f5f9;
      border-radius: 8px;
      text-align: left;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: monospace;
      overflow-x: auto;
    }
    .debug h3 { font-size: 0.85rem; color: var(--text); margin-bottom: 8px; }
    .debug pre { white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon">🏗️</div>
      <h1>产品配置页面</h1>
      <p>产品配置功能正在开发中，敬请期待……</p>
      <a href="index.html" class="btn btn-primary">← 返回指标估算</a>

      <div class="debug" id="debug-data" style="display:none;">
        <h3>📦 从第一页传入的数据</h3>
        <pre id="debug-content"></pre>
      </div>
    </div>
  </div>

  <script>
    // 读取第一页传入的数据并展示（调试用）
    (function() {
      const raw = sessionStorage.getItem('projectCalculatorData');
      if (raw) {
        try {
          const data = JSON.parse(raw);
          const el = document.getElementById('debug-data');
          const content = document.getElementById('debug-content');
          el.style.display = 'block';
          content.textContent = JSON.stringify(data, null, 2);
        } catch (e) {
          console.error('解析数据失败', e);
        }
      }
    })();
  </script>
</body>
</html>
